          <div class="eyebrow">Live System Status</div>
          <div class="status-panel">
            <div class="stat-block">
              <div class="stat-label">Pod Health</div>
              <div class="stat-value">NOMINAL</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">Replicas</div>
              <div class="stat-value amber">3 / 3</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">Session Uptime</div>
