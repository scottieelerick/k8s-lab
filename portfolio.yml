            </p>
            <div class="tags">
              <span class="tag amber">Entrepreneurship</span>
              <span class="tag amber">Product Development</span>
              <span class="tag green">Brand Operations</span>
            </div>
          </div>
        </section>

        <!-- ── Architecture Callout ──────────────────── -->
        <section>
          <div class="eyebrow">How This Page Works — K8s Architecture</div>
          <div class="terminal">
<span class="cmt"># Everything in this file is reproducible from the Git repo</span>

<span class="cmd">kubectl get all</span>
<span class="val">NAME                             READY   STATUS    RESTARTS</span>
<span class="hi">pod/portfolio-xxxxxxxxx-aaaaa     1/1     Running   0</span>
<span class="hi">pod/portfolio-xxxxxxxxx-bbbbb     1/1     Running   0</span>
<span class="hi">pod/portfolio-xxxxxxxxx-ccccc     1/1     Running   0</span>
<span class="val">service/portfolio-service         LoadBalancer   &lt;pending&gt;   80:30080/TCP</span>
<span class="val">deployment.apps/portfolio         3/3     3            3</span>

<span class="cmt"># Delete a pod — Kubernetes self-heals in seconds</span>
<span class="cmd">kubectl delete pod portfolio-xxxxxxxxx-aaaaa</span>
<span class="val">pod "portfolio-xxxxxxxxx-aaaaa" deleted</span>
<span class="cmd">kubectl get pods</span>
<span class="hi">portfolio-xxxxxxxxx-ddddd     0/1   ContainerCreating   0   2s</span>

<span class="cmt"># Scale up live — no downtime</span>
<span class="cmd">kubectl scale deployment portfolio --replicas=5</span>
<span class="val">deployment.apps/portfolio scaled</span>

<span class="cmt"># The whole lab rebuilds from one command</span>
<span class="cmd">kubectl apply -f manifests/</span>
<span class="val">configmap/portfolio-html created</span>
<span class="val">deployment.apps/portfolio created</span>
<span class="val">service/portfolio-service created</span>
          </div>
        </section>

      </main>

      <footer>
        <p>
          Deployed on Kubernetes &nbsp;·&nbsp; nginx:alpine &nbsp;·&nbsp; 3 replicas &nbsp;·&nbsp; LoadBalancer service
          <br><br>
          <a href="https://github.com/scottieelerick" target="_blank">github.com/scottieelerick</a>
          &nbsp;·&nbsp;
          Built for the Defense Unicorns Shipmates Team
        </p>
      </footer>

      <script>
        // Live session uptime counter
        const start = Date.now();
        function tick() {
          const s = Math.floor((Date.now() - start) / 1000);
          const h = String(Math.floor(s / 3600)).padStart(2, '0');
          const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
          const sec = String(s % 60).padStart(2, '0');
          document.getElementById('uptime').textContent = h + ':' + m + ':' + sec;
        }
        setInterval(tick, 1000);
        tick();
      </script>

    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  labels:
    app: portfolio
spec:
  replicas: 3
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-vol
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: html-vol
        configMap:
          name: portfolio-html
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  labels:
    app: portfolio
spec:
  type: LoadBalancer
  selector:
    app: portfolio
  ports:
  - port: 80
    targetPort: 80
