apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-html
  labels:
    app: portfolio
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Scottie | Junior Engineer Candidate — Defense Unicorns</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
      <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
          --bg:          #080c18;
          --bg-card:     #0d1424;
          --bg-hover:    #111b2e;
          --border:      rgba(124, 58, 237, 0.18);
          --border-hi:   rgba(124, 58, 237, 0.55);
          --purple:      #8b5cf6;
          --purple-lo:   #6d28d9;
          --amber:       #f59e0b;
          --green:       #10b981;
          --text:        #dde4f0;
          --text-dim:    #94a3b8;
          --text-muted:  #4b5a72;
          --mono:        'JetBrains Mono', monospace;
          --display:     'Space Grotesk', sans-serif;
          --body:        'Inter', sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
          font-family: var(--body);
          background: var(--bg);
          color: var(--text);
          line-height: 1.7;
          min-height: 100vh;
        }

        /* ── Header ─────────────────────────────────────── */
        header {
          position: sticky;
          top: 0;
          z-index: 100;
          background: rgba(8, 12, 24, 0.92);
          backdrop-filter: blur(12px);
          border-bottom: 1px solid var(--border);
          padding: 0.85rem 2rem;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        .header-name {
          font-family: var(--display);
          font-weight: 700;
          font-size: 1rem;
          letter-spacing: 0.03em;
          color: var(--text);
        }

        .header-name span { color: var(--purple); }

        .live-badge {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          font-family: var(--mono);
          font-size: 0.68rem;
          color: var(--green);
          letter-spacing: 0.08em;
          border: 1px solid rgba(16, 185, 129, 0.3);
          padding: 0.3rem 0.75rem;
          border-radius: 2px;
        }

        .pulse {
          width: 7px; height: 7px;
          background: var(--green);
          border-radius: 50%;
          animation: pulse 2s infinite;
        }

        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50%       { opacity: 0.4; transform: scale(0.8); }
        }

        /* ── Layout ─────────────────────────────────────── */
        main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 5rem; }

        section { margin-bottom: 4rem; }

        .eyebrow {
          font-family: var(--mono);
          font-size: 0.65rem;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: var(--amber);
          margin-bottom: 1rem;
          display: flex;
          align-items: center;
          gap: 0.75rem;
        }

        .eyebrow::after {
          content: '';
          flex: 1;
          height: 1px;
          background: var(--border);
        }

        /* ── Hero ───────────────────────────────────────── */
        .hero { padding-top: 1rem; }

        .hero h1 {
          font-family: var(--display);
          font-size: clamp(2.4rem, 6vw, 3.8rem);
          font-weight: 700;
          line-height: 1.1;
          letter-spacing: -0.02em;
          margin-bottom: 0.5rem;
        }

        .hero h1 .accent { color: var(--purple); }

        .hero-title {
          font-family: var(--mono);
          font-size: 0.85rem;
          color: var(--text-dim);
          margin-bottom: 1.25rem;
          letter-spacing: 0.04em;
        }

        .hero-tagline {
          font-size: 1.05rem;
          color: var(--text-dim);
          max-width: 560px;
          margin-bottom: 1.75rem;
          line-height: 1.8;
        }

        .hero-tagline strong { color: var(--text); }

        .btn-github {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          font-family: var(--mono);
          font-size: 0.78rem;
          letter-spacing: 0.06em;
          color: var(--purple);
          border: 1px solid var(--border-hi);
          padding: 0.55rem 1.1rem;
          text-decoration: none;
          border-radius: 2px;
          transition: background 0.2s, border-color 0.2s;
        }

        .btn-github:hover { background: rgba(139,92,246,0.08); border-color: var(--purple); }

        /* ── Status Panel ───────────────────────────────── */
        .status-panel {
          border: 1px solid var(--border-hi);
          border-left: 3px solid var(--purple);
          background: var(--bg-card);
          padding: 1.5rem;
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
          gap: 1.25rem;
        }

        .stat-block { display: flex; flex-direction: column; gap: 0.3rem; }

        .stat-label {
          font-family: var(--mono);
          font-size: 0.6rem;
          letter-spacing: 0.15em;
          text-transform: uppercase;
          color: var(--text-muted);
        }

        .stat-value {
          font-family: var(--mono);
          font-size: 1.1rem;
          font-weight: 600;
          color: var(--green);
        }

        .stat-value.amber { color: var(--amber); }
        .stat-value.purple { color: var(--purple); }

        /* ── Cards ──────────────────────────────────────── */
        .card-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
          gap: 1rem;
        }

        .card {
          background: var(--bg-card);
          border: 1px solid var(--border);
          padding: 1.4rem;
          transition: border-color 0.2s, background 0.2s;
        }

        .card:hover { border-color: var(--border-hi); background: var(--bg-hover); }

        .card-icon {
          font-size: 1.4rem;
          margin-bottom: 0.75rem;
          display: block;
        }

        .card h3 {
          font-family: var(--display);
          font-size: 0.95rem;
          font-weight: 600;
          margin-bottom: 0.4rem;
          color: var(--text);
        }

        .card p {
          font-size: 0.85rem;
          color: var(--text-dim);
          line-height: 1.65;
        }

        .card p strong { color: var(--amber); font-weight: 500; }

        /* ── Tags ───────────────────────────────────────── */
        .tag-group { margin-bottom: 1.1rem; }

        .tag-group-label {
          font-family: var(--mono);
          font-size: 0.62rem;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--text-muted);
          margin-bottom: 0.5rem;
        }

        .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

        .tag {
          font-family: var(--mono);
          font-size: 0.72rem;
          padding: 0.3rem 0.65rem;
          border-radius: 2px;
          letter-spacing: 0.04em;
        }

        .tag.purple { background: rgba(139,92,246,0.12); color: var(--purple); border: 1px solid rgba(139,92,246,0.25); }
        .tag.amber  { background: rgba(245,158,11,0.1);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.25); }
        .tag.green  { background: rgba(16,185,129,0.1);  color: var(--green);  border: 1px solid rgba(16,185,129,0.25); }

        /* ── Projects ───────────────────────────────────── */
        .project {
          border: 1px solid var(--border);
          background: var(--bg-card);
          padding: 1.6rem;
          margin-bottom: 1rem;
          transition: border-color 0.2s;
        }

        .project:hover { border-color: var(--border-hi); }

        .project-header {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 1rem;
          margin-bottom: 0.75rem;
          flex-wrap: wrap;
        }

        .project h3 {
          font-family: var(--display);
          font-size: 1.05rem;
          font-weight: 600;
        }

        .project-badge {
          font-family: var(--mono);
          font-size: 0.6rem;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          padding: 0.25rem 0.6rem;
          border-radius: 2px;
          white-space: nowrap;
        }

        .badge-live   { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
        .badge-active { background: rgba(139,92,246,0.12); color: var(--purple); border: 1px solid rgba(139,92,246,0.25); }
        .badge-built  { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }

        .project p { font-size: 0.87rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 0.85rem; }
        .project p strong { color: var(--text); font-weight: 500; }

        /* ── Terminal Block ─────────────────────────────── */
        .terminal {
          background: #060912;
          border: 1px solid var(--border);
          border-left: 3px solid var(--amber);
          padding: 1.4rem 1.6rem;
          font-family: var(--mono);
          font-size: 0.78rem;
          line-height: 2;
          color: var(--text-dim);
          overflow-x: auto;
        }

        .terminal .cmd  { color: var(--green); }
        .terminal .val  { color: var(--text); }
        .terminal .cmt  { color: var(--text-muted); }
        .terminal .hi   { color: var(--amber); }

        /* ── Footer ─────────────────────────────────────── */
        footer {
          border-top: 1px solid var(--border);
          margin-top: 5rem;
          padding: 2rem;
          text-align: center;
          font-family: var(--mono);
          font-size: 0.7rem;
          color: var(--text-muted);
          letter-spacing: 0.06em;
        }

        footer a { color: var(--purple); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
          header { padding: 0.75rem 1rem; }
          main   { padding: 2rem 1rem 4rem; }
          .hero h1 { font-size: 2.2rem; }
        }
      </style>
    </head>

    <body>

      <header>
