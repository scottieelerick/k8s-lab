            </div>
            <div class="stat-block">
              <div class="stat-label">Probe Status</div>
              <div class="stat-value">PASSING</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">Service Type</div>
              <div class="stat-value amber">LoadBalancer</div>
            </div>
            <div class="stat-block">
              <div class="stat-label">Image</div>
              <div class="stat-value purple">nginx:alpine</div>
            </div>
