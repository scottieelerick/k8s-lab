apiVersion: v1
kind: Service
metadata:
  name: nginx-demo-service
spec:
  type: NodePort
  selector:
    app: nginx-demo # routes to any pod with this label
  ports:
  - port: 80 # service's internal port
    targetPort: 80 # container's port
    nodePort: 30080 # port exposed on your machine (30000–32767)
